services:
  db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: calvision
      POSTGRES_PASSWORD: calvision
      POSTGRES_DB: calvision
    ports:
      - "5433:5432"
    volumes:
      - calvision_pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calvision -d calvision"]
      interval: 3s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://calvision:calvision@db:5432/calvision
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_API_URL: ${DIFY_API_URL:-https://api.dify.ai}
      DIFY_APP_MODE: ${DIFY_APP_MODE:-workflow}
      AUTH_URL: http://localhost:3000
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
    volumes:
      - .:/app
      - calvision_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  studio:
    build:
      context: .
      dockerfile: Dockerfile.studio
    restart: unless-stopped
    ports:
      - "4983:4983"
    environment:
      DATABASE_URL: postgresql://calvision:calvision@db:5432/calvision
    depends_on:
      db:
        condition: service_healthy

volumes:
  calvision_pg_data:
  calvision_node_modules:
